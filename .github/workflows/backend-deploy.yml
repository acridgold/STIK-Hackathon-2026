name: Deploy Backend
on:
  push:
    branches: ["main"]
permissions:
  contents: read
jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run tests (if any)
        run: |
          cd backend
          # Add your test commands here, e.g., python -m pytest
      - name: Deploy to Railway
        run: |
          npm install -g @railway/cli
          railway up --service backend --source ./backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}